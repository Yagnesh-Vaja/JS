<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        for (let i = 1; i <= 10; i++) {
            for (let spac = 10; spac >= i; spac--) {
                document.write("")
            }
            for (let j = 1; j <= 10; j++) {
                if (j == 10 || i == 10 || j == 10 - i + 1) {
                    document.write("*")
                } else {
                    document.write("&nbsp;&nbsp;")
                }
            }
            document.write("<br>")
        }
    </script>
</body>

</html>
