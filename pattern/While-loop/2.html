<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let i=1;
        let rows=5;
        while(i<=rows){
            let row="";
            let j=5;
            while(j>=i){
                row += "*";
                j--;
            }
            document.write(row);
            document.write("<br>")
            i++;
        }
    </script>
</body>
</html>
