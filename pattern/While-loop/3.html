<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let rows = 5;
        let i = 1; 

        while (i <= rows) {
            let spaces = '';
            let stars = '';
            let j = 5; 

      
            while (j>=i) {
                spaces += '&nbsp;&nbsp';
                j--;
            }

            let k = 1; 
            
            while (k <= i) {
                stars += '*';
                k++;
            }

            document.write(spaces + stars); 
            document.write("<br>");
            i++;
        }




    </script>
</body>

</html>
