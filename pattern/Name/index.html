<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //Y
        for (let i = 1; i <= 5; i++) {
            for (let j = 1; j <= 5; j++) {
                if (i == j && i <= 3 || j == 5 - i + 1 && i <= 3 || i >= 3 && j == 3) {
                    document.write("*")
                } else {
                    document.write("&nbsp;&nbsp;")
                }
            }
            document.write("<br>")
        }
        document.write("<br>")
        //A
        for(let i=1;i<=5;i++){
            for(let k=5;k>=i;k--){
                document.write("&nbsp;")
            }
            for(let j=1;j<=5;j++){
               if(j==1||i==3&&j<=3||i==j+1-1){
                document.write("*")
               }else{
                document.write("&nbsp;&nbsp;")
               }
            }
            document.write("<br>")
        }
    </script>
</body>

</html>
